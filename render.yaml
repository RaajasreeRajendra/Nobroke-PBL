services:
  - type: web
    name: nobroke-ml
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  - type: web
    name: nobroke-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ML_URL
        fromService:
          name: nobroke-ml
          type: web
          property: url
